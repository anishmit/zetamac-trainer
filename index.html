<!doctype html>
<html>
  <head>
    <title>Arithmetic Game – Online Speed Drill</title>
    <link href="app.css" rel="stylesheet" />
  </head>
  <body>
    <div id="welcome">
      <h1>Arithmetic Game</h1>
      <p>The Arithmetic Game is a fast-paced speed drill where you are given two
        minutes to solve as many arithmetic problems as you can.</p>
      <form class="game-options">
        <p>
          Speed: <input type="text" name="speed" id="speed" value="120" />
        </p>
        <input type="submit" value="Start" />
      </form>
      <script>
        document.querySelector('.game-options').addEventListener('submit', function(e) {
          e.preventDefault();
          var s = parseInt(document.getElementById('speed').value);
          if (!(s > 0)) s = 120;
          window.location.href = 'game.html?speed=' + s;
        });
      </script>
    </div>
  </body>
</html>
